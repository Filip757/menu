<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Central - Menú Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-header { font-family: 'Bebas Neue', cursive; letter-spacing: 0.05em; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        /* Suavizado de scroll para las categorías */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#F9F9F9] text-gray-900 antialiased">

<div x-data="appLaCentral()" class="max-w-md mx-auto bg-white min-h-screen shadow-2xl relative">

    <header class="bg-white p-5 flex justify-between items-center sticky top-0 z-30 border-b border-gray-100">
        <h1 class="text-4xl font-header tracking-widest leading-none pt-1">LA CENTRAL</h1>
        <div class="flex gap-3 text-xs font-bold">
            <button @click="idioma = 'es'" :class="idioma === 'es' ? 'text-black underline' : 'text-gray-400'">ES</button>
            <button @click="idioma = 'en'" :class="idioma === 'en' ? 'text-black underline' : 'text-gray-400'">EN</button>
        </div>
    </header>

    <nav x-show="pantalla === 'menu'" class="bg-white sticky top-[73px] z-20 border-b border-gray-50 flex gap-6 overflow-x-auto px-5 py-3 no-scrollbar shadow-sm">
        <template x-for="cat in categorias[idioma]">
            <a :href="'#' + cat" x-text="cat" class="text-[10px] uppercase font-black tracking-widest whitespace-nowrap text-gray-500 hover:text-black"></a>
        </template>
    </nav>

    <div x-show="pantalla === 'menu'" class="p-4 pb-32">
        <template x-for="cat in categorias[idioma]" :key="cat">
            <div class="mb-10" :id="cat">
                <h2 x-text="cat" class="font-header text-3xl mb-4 border-l-4 border-black pl-3 tracking-wider"></h2>
                
                <div class="space-y-4">
                    <template x-for="producto in menu[idioma].filter(p => p.categoria === cat)" :key="producto.id">
                        <div class="flex gap-4 items-center bg-white p-3 rounded-2xl border border-gray-100 shadow-sm relative">
                            <div class="w-20 h-20 flex-shrink-0 bg-gray-100 rounded-xl overflow-hidden border border-gray-50">
                                <img :src="producto.imagen" class="w-full h-full object-cover">
                            </div>
                            
                            <div class="flex-grow">
                                <div class="flex justify-between items-start mb-1">
                                    <h3 x-text="producto.nombre" class="font-bold text-base leading-tight"></h3>
                                    <template x-if="producto.etiqueta">
                                        <span x-text="producto.etiqueta" class="text-[9px] bg-yellow-100 px-1 rounded font-black uppercase"></span>
                                    </template>
                                </div>
                                <p x-text="producto.descripcion" class="text-[11px] text-gray-500 line-clamp-2 h-7 leading-snug"></p>
                                
                                <div class="flex justify-between items-center mt-2">
                                    <span x-text="producto.precio + '€'" class="font-black text-sm"></span>
                                    
                                    <div class="flex items-center gap-2 bg-gray-50 rounded-full p-1 border border-gray-100 scale-90">
                                        <button @click="quitar(producto.id)" class="w-8 h-8 flex items-center justify-center bg-white rounded-full shadow-sm font-bold text-black border border-gray-200">-</button>
                                        <span x-text="obtenerCantidad(producto.id)" class="w-3 text-center font-black text-sm"></span>
                                        <button @click="agregar(producto.id)" class="w-8 h-8 flex items-center justify-center bg-black rounded-full shadow-sm font-bold text-white hover:bg-gray-800">+</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </div>

    <div x-show="pantalla === 'checkout'" class="p-6 pb-24" style="display: none;">
        <h2 class="font-header text-4xl mb-6 text-center" x-text="textos[idioma].tituloResumen"></h2>

        <div class="space-y-3 mb-8">
            <template x-for="item in carrito" :key="item.id">
                <div class="flex justify-between items-center py-2 border-b border-dashed border-gray-300">
                    <div class="flex items-center gap-3">
                        <span x-text="item.cantidad + 'x'" class="font-black text-sm"></span>
                        <span x-text="item.nombre" class="font-medium text-gray-800"></span>
                    </div>
                    <span x-text="(item.precio * item.cantidad).toFixed(2) + '€'" class="font-bold"></span>
                </div>
            </template>
        </div>

        <div class="flex justify-between items-center text-2xl font-black mb-10 p-4 bg-gray-50 rounded-xl border-2 border-black">
            <span x-text="textos[idioma].total"></span>
            <span x-text="calcularTotal() + '€'"></span>
        </div>

        <button 
            @click="enviarPedido()" 
            :disabled="enviando"
            class="w-full bg-green-600 text-white font-black py-4 rounded-xl shadow-lg disabled:opacity-50"
        >
            <span x-show="!enviando" x-text="textos[idioma].botonConfirmar"></span>
            <span x-show="enviando" x-text="textos[idioma].procesando"></span>
        </button>

        <button @click="pantalla = 'menu'" class="w-full mt-4 text-gray-500 font-bold text-sm underline" x-text="textos[idioma].botonVolver"></button>
    </div>

    <div x-show="pantalla === 'menu' && carrito.length > 0" class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md border-t max-w-md mx-auto z-40">
        <button @click="pantalla = 'checkout'" class="w-full bg-black text-white font-black py-4 rounded-xl flex justify-between px-6 shadow-2xl">
            <span x-text="textos[idioma].botonVerPedido"></span>
            <span x-text="calcularTotal() + '€'"></span>
        </button>
    </div>

</div>

<script>
    function appLaCentral() {
        return {
            idioma: 'es',
            pantalla: 'menu',
            carrito: [],
            enviando: false,
            
            categorias: { es: ['Bowl', 'Tacos', 'Sides'], en: ['Bowl', 'Tacos', 'Sides'] },
            
            textos: {
                es: { botonVerPedido: "VER MI PEDIDO", tituloResumen: "TU PEDIDO", total: "TOTAL:", botonVolver: "Modificar pedido", botonConfirmar: "CONFIRMAR Y ENVIAR A BARRA", procesando: "ENVIANDO..." },
                en: { botonVerPedido: "VIEW MY ORDER", tituloResumen: "YOUR ORDER", total: "TOTAL:", botonVolver: "Change order", botonConfirmar: "CONFIRM & SEND TO BAR", procesando: "SENDING..." }
            },

            menu: {
                es: [
                    { id: 1, categoria: 'Bowl', nombre: 'Mediterráneo', descripcion: 'Tajine de pollo o Falafel, Hummus, Garbanzos, Cuscús, Salsa de yogur.', precio: 15.95, imagen: 'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=300' },
                    { id: 2, categoria: 'Bowl', nombre: 'Falafel Crush', descripcion: 'Arroz, Falafel, Batata, Hummus, Semilla Calabaza, Chili Mayo.', precio: 14.95, etiqueta: 'Vegan', imagen: 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=300' },
                    { id: 7, categoria: 'Tacos', nombre: 'La Jefa', descripcion: 'Setas de Ostra, Crema de aguacate, Cebolla encurtida, Cilantro.', precio: 13.50, etiqueta: 'Vegan', imagen: 'https://images.unsplash.com/photo-1565299585323-38d6b0865b47?w=300' },
                    { id: 10, categoria: 'Tacos', nombre: 'El Jefe', descripcion: 'Costilla de Ternera, Pico de Gallo, Jalapeño, Salsa de Aguacate.', precio: 14.50, imagen: 'https://images.unsplash.com/photo-1565299585323-38d6b0865b47?w=300' },
                    { id: 5, categoria: 'Sides', nombre: 'Guacamole & Co', descripcion: 'Guacamole casero, Totopos, Salsa.', precio: 7.00, imagen: 'https://images.unsplash.com/photo-1565299585323-38d6b0865b47?w=300' }
                ],
                en: [
                    { id: 1, categoria: 'Bowl', nombre: 'Mediterranean', descripcion: 'Chicken Tajine or Falafel, Hummus, Couscous, Yogurt sauce.', precio: 15.95, imagen: 'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=300' },
                    { id: 2, categoria: 'Bowl', nombre: 'Falafel Crush', descripcion: 'Rice, Falafel, Sweet Potato, Hummus, Chili Mayo.', precio: 14.95, etiqueta: 'Vegan', imagen: 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=300' },
                    { id: 7, categoria: 'Tacos', nombre: 'La Jefa', descripcion: 'Oyster Mushrooms, Avocado cream, Pickled onion, Cilantro.', precio: 13.50, etiqueta: 'Vegan', imagen: 'https://images.unsplash.com/photo-1565299585323-38d6b0865b47?w=300' },
                    { id: 10, categoria: 'Tacos', nombre: 'El Jefe', descripcion: 'Slow-roasted Beef Rib, Pico de Gallo, Avocado salsa.', precio: 14.50, imagen: 'https://images.unsplash.com/photo-1565299585323-38d6b0865b47?w=300' },
                    { id: 5, categoria: 'Sides', nombre: 'Guacamole & Co', descripcion: 'Homemade Guacamole, Tortilla chips, Salsa.', precio: 7.00, imagen: 'https://images.unsplash.com/photo-1565299585323-38d6b0865b47?w=300' }
                ]
            },

            obtenerCantidad(id) {
                const item = this.carrito.find(i => i.id === id);
                return item ? item.cantidad : 0;
            },

            agregar(id) {
                const p = this.menu[this.idioma].find(x => x.id === id);
                const i = this.carrito.find(x => x.id === id);
                if (i) { i.cantidad++; } else { this.carrito.push({ ...p, cantidad: 1 }); }
            },

            quitar(id) {
                const idx = this.carrito.findIndex(x => x.id === id);
                if (idx !== -1) {
                    if (this.carrito[idx].cantidad > 1) { this.carrito[idx].cantidad--; } 
                    else { this.carrito.splice(idx, 1); }
                }
                if (this.carrito.length === 0) { this.pantalla = 'menu'; }
            },

            calcularTotal() {
                return this.carrito.reduce((t, i) => t + (i.precio * i.cantidad), 0).toFixed(2);
            },

            // FUNCIÓN PARA ENVIAR EL PEDIDO A LA IMPRESORA EPSON
            async enviarPedido() {
                this.enviando = true;
                
                // Los chicos deben sustituir esta URL por la de su servidor
                const URL_SERVIDOR = "https://tu-servidor-la-central.com/api/imprimir";

                const datosPedido = {
                    tienda: "La Central - Lajares",
                    items: this.carrito,
                    total: this.calcularTotal(),
                    timestamp: new Date().toISOString()
                };

                try {
                    // Simulación de envío (esto conectará con el backend que traduce a XML para la Epson)
                    console.log("Enviando pedido a la impresora...", datosPedido);
                    
                    // Comentado para la demo, pero así sería la llamada real:
                    /*
                    const response = await fetch(URL_SERVIDOR, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(datosPedido)
                    });
                    */

                    // Simulamos espera de 2 segundos
                    await new Promise(res => setTimeout(res, 2000));
                    
                    alert("¡Pedido enviado a la barra! Gracias.");
                    this.carrito = [];
                    this.pantalla = 'menu';
                } catch (error) {
                    alert("Error al enviar el pedido. Inténtalo de nuevo.");
                } finally {
                    this.enviando = false;
                }
            }
        }
    }
</script>
</body>
</html>
